default: &default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 5 } %>
  host: localhost
  username: <%= ENV.fetch("DB_USERNAME", "macbook") %>
  password: <%= ENV.fetch("DB_PASSWORD", "") %>

development:
  <<: *default
  database: cacheese_development

test:
  <<: *default
  database: cacheese_test

production:
  <<: *default
  url: <%= ENV["DATABASE_URL"] %>